id: org.gajim.Gajim.Devel.Plugin.pgp
runtime: org.gajim.Gajim.Devel
sdk: org.gnome.Sdk//50
build-extension: true
separate-locales: false
appstream-compose: false

build-options:
  env:
    PIP_TARGET: /app/plugins/pgp/site-packages
    PIP_DISABLE_PIP_VERSION_CHECK: "1"

modules:
  - name: python3-python-gnupg
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation .
    sources:
      - type: archive
        url: https://github.com/vsajip/python-gnupg/archive/refs/tags/0.5.6.tar.gz
        sha512: 910e1cd94e566f0f7b2335ed3ba1f21528c66a2f3390fd348233b721327874cd9a12b5de671b8e5bcd9ae6976bd3d4f7f89e379b305363640de78f03ff9d763e

  - name: gajim-pgp
    buildsystem: simple
    build-commands:
      - 'cp -R -t ${FLATPAK_DEST} *'
    post-install:
      - install -Dm644 --target-directory=${FLATPAK_DEST}/share/metainfo org.gajim.Gajim.Plugin.pgp.metainfo.xml
      - appstreamcli compose --components=${FLATPAK_ID} --prefix=/ --origin=${FLATPAK_ID}
        --result-root=${FLATPAK_DEST} --data-dir=${FLATPAK_DEST}/share/app-info/xmls ${FLATPAK_DEST}
    sources:
      - type: archive
        strip-components: 0
        url: https://ftp.gajim.org/plugins/master/pgp/pgp_1.8.2.zip
        sha256: f231364533f6893b853139e52745b003bda64aa7c9a09d07ba6aaccebb40527e
      - type: shell
        commands:
          - sed -i "s+org.gajim.Gajim+org.gajim.Gajim.Devel+" org.gajim.Gajim.Plugin.*.metainfo.xml
